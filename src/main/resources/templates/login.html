<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Passport Automation System</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-blue-50">
    <nav class="bg-blue-700 p-4 flex justify-between items-center">
        <div class="flex items-center">
            <a href="/" class="text-white text-xl font-semibold">Passport Automation System</a>
        </div>
        <a href="/register" class="text-white hover:text-blue-200">Register</a>
    </nav>

    <div class="container mx-auto max-w-md mt-12">
        <div class="bg-white p-8 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
            
            <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                <span th:text="${error}"></span>
            </div>

            <form action="/login" method="POST">
                <div class="mb-4">
                    <label for="email" class="block font-semibold mb-2">Email Address:</label>
                    <input type="email" id="email" name="email" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                </div>

                <div class="mb-6">
                    <label for="password" class="block font-semibold mb-2">Password:</label>
                    <input type="password" id="password" name="password" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                </div>

                <button type="submit" 
                        class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700">
                    Login
                </button>
            </form>

            <p class="mt-4 text-center">
                Don't have an account? <a href="/register" class="text-blue-600 hover:text-blue-800">Register here</a>
            </p>
        </div>
    </div>
</body>
</html>
